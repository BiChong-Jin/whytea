<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Audience Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #1a1a1f;
      --border: #2a2a32;
      --text: #efeff1;
      --muted: #848494;
      --accent: #9147ff;
      --positive: #00c853;
      --neutral: #ffab00;
      --negative: #f44336;
      --mixed: #2196f3;
      --superchat: #ffd600;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
    }

    #url-input {
      flex: 1;
      min-width: 260px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 12px;
      font-size: 13px;
      outline: none;
    }
    #url-input:focus { border-color: var(--accent); }

    button {
      padding: 7px 16px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }

    #btn-start { background: var(--accent); color: #fff; }
    #btn-stop  { background: #333; color: var(--text); }

    #status-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #333;
      color: var(--muted);
      white-space: nowrap;
    }
    #status-badge.monitoring { background: #1b3a1b; color: var(--positive); }
    #status-badge.error      { background: #3a1b1b; color: var(--negative); }

    /* ── Main layout ── */
    main {
      display: grid;
      grid-template-columns: 340px 1fr;
      overflow: hidden;
    }

    /* ── Comment feed ── */
    #feed-panel {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #comment-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
    }

    .comment {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border);
      animation: fadeIn .2s ease;
    }
    .comment.superchat {
      background: rgba(255, 214, 0, .08);
      border-left: 3px solid var(--superchat);
    }

    .comment-author {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2px;
    }
    .comment.superchat .comment-author { color: var(--superchat); }

    .comment-amount {
      font-size: 10px;
      color: var(--superchat);
      font-weight: 700;
      margin-bottom: 2px;
    }

    .comment-text {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
    }

    #empty-feed {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
    }

    /* ── Analysis panel ── */
    #analysis-panel {
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 20px 28px;
      gap: 24px;
    }

    /* Mood gauge */
    #gauge-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #gauge-svg { width: 200px; height: 110px; }

    #mood-score-label {
      font-size: 36px;
      font-weight: 800;
      color: var(--text);
    }

    #sentiment-badge {
      font-size: 13px;
      font-weight: 700;
      padding: 4px 14px;
      border-radius: 20px;
      text-transform: capitalize;
      background: #333;
      color: var(--muted);
    }
    #sentiment-badge.positive { background: #1b3a1b; color: var(--positive); }
    #sentiment-badge.negative { background: #3a1b1b; color: var(--negative); }
    #sentiment-badge.neutral  { background: #3a3a1b; color: var(--neutral); }
    #sentiment-badge.mixed    { background: #1b2a3a; color: var(--mixed); }

    /* Sections */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #themes-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .theme-pill {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text);
    }

    #highlights-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .highlight-quote {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 8px 12px;
      font-size: 13px;
      font-style: italic;
      color: var(--text);
      line-height: 1.45;
    }

    #summary-text {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    #meta-info {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
    }

    #placeholder-msg {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      margin: auto;
    }

    /* Fade transition on analysis update */
    .fade-out { opacity: 0; transition: opacity .25s; }
    .fade-in  { opacity: 1; transition: opacity .25s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<header>
  <h1>Stream Audience Analyzer</h1>
  <input id="url-input" type="text" placeholder="Paste YouTube live URL or video ID…" />
  <button id="btn-start" onclick="startMonitoring()">Start</button>
  <button id="btn-stop"  onclick="stopMonitoring()">Stop</button>
  <span id="status-badge">Idle</span>
</header>

<main>
  <!-- Comment feed -->
  <div id="feed-panel">
    <div class="panel-title">Live Chat</div>
    <div id="comment-list">
      <div id="empty-feed">No comments yet.<br>Start monitoring a live stream.</div>
    </div>
  </div>

  <!-- Analysis panel -->
  <div id="analysis-panel">
    <div id="placeholder-msg">
      Paste a YouTube live URL above and click <strong>Start</strong>.<br>
      The AI overview will appear here every 30 seconds.
    </div>

    <!-- Hidden until first analysis -->
    <div id="analysis-content" style="display:none; display:flex; flex-direction:column; gap:24px;">

      <div id="gauge-wrap">
        <svg id="gauge-svg" viewBox="0 0 200 110">
          <path id="gauge-bg" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#2a2a32" stroke-width="16" stroke-linecap="round"/>
          <path id="gauge-arc" d="M20,100 A80,80 0 0,1 180,100" fill="none" stroke="#9147ff" stroke-width="16" stroke-linecap="round"
                stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
          <text id="mood-score-label" x="100" y="90" text-anchor="middle"
                font-size="36" font-weight="800" fill="#efeff1">--</text>
        </svg>
        <span id="sentiment-badge">--</span>
      </div>

      <div>
        <div class="section-label">Key Themes</div>
        <div id="themes-list"></div>
      </div>

      <div>
        <div class="section-label">Highlights</div>
        <div id="highlights-list"></div>
      </div>

      <div>
        <div class="section-label">Summary</div>
        <p id="summary-text"></p>
      </div>

      <div id="meta-info"></div>
    </div>
  </div>
</main>

<script>
  let ws = null;
  let reconnectTimer = null;
  const MAX_COMMENTS = 200;

  // ── WebSocket ──────────────────────────────────────────────────────────────

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(`ws://${location.host}/ws`);

    ws.onopen = () => console.log("[ws] connected");

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === "comment")  renderComment(msg.payload);
      if (msg.type === "analysis") renderAnalysis(msg.payload);
      if (msg.type === "status")   updateStatus(msg.payload);
      if (msg.type === "error")    showError(msg.payload);
    };

    ws.onclose = () => {
      console.log("[ws] disconnected — retrying in 3s");
      reconnectTimer = setTimeout(connect, 3000);
    };
  }

  // ── API calls ──────────────────────────────────────────────────────────────

  async function startMonitoring() {
    const url = document.getElementById("url-input").value.trim();
    if (!url) { alert("Please enter a YouTube live URL or video ID."); return; }
    try {
      const res = await fetch("/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ video_url: url }),
      });
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || res.statusText);
      }
      connect();
    } catch (e) {
      alert(`Error: ${e.message}`);
    }
  }

  async function stopMonitoring() {
    await fetch("/stop", { method: "POST" });
    updateStatus({ state: "idle", message: "Stopped." });
  }

  // ── Renderers ──────────────────────────────────────────────────────────────

  function renderComment(c) {
    const list = document.getElementById("comment-list");

    // Remove empty-feed placeholder
    const empty = document.getElementById("empty-feed");
    if (empty) empty.remove();

    const div = document.createElement("div");
    div.className = "comment" + (c.is_super_chat ? " superchat" : "");
    div.innerHTML = `
      <div class="comment-author">${esc(c.author)}</div>
      ${c.is_super_chat && c.super_chat_amount ? `<div class="comment-amount">${esc(c.super_chat_amount)}</div>` : ""}
      <div class="comment-text">${esc(c.message)}</div>
    `;

    list.prepend(div);

    // Cap DOM nodes
    while (list.children.length > MAX_COMMENTS) {
      list.removeChild(list.lastChild);
    }
  }

  function renderAnalysis(data) {
    const content = document.getElementById("analysis-content");
    const placeholder = document.getElementById("placeholder-msg");

    // Fade out
    content.classList.add("fade-out");

    setTimeout(() => {
      placeholder.style.display = "none";
      content.style.display = "flex";

      // Gauge
      const score = Math.max(0, Math.min(100, data.mood_score));
      updateGauge(score);
      document.getElementById("mood-score-label").textContent = score;

      // Sentiment badge
      const badge = document.getElementById("sentiment-badge");
      badge.textContent = data.overall_sentiment;
      badge.className = ""; // reset
      badge.id = "sentiment-badge";
      badge.classList.add(data.overall_sentiment);

      // Themes
      const themesEl = document.getElementById("themes-list");
      themesEl.innerHTML = (data.key_themes || [])
        .map(t => `<span class="theme-pill">${esc(t)}</span>`)
        .join("");

      // Highlights
      const hlEl = document.getElementById("highlights-list");
      hlEl.innerHTML = (data.highlights || [])
        .map(q => `<div class="highlight-quote">${esc(q)}</div>`)
        .join("");

      // Summary
      document.getElementById("summary-text").textContent = data.summary || "";

      // Meta
      document.getElementById("meta-info").textContent =
        `${data.comment_count} comments analysed · updated ${new Date().toLocaleTimeString()}`;

      // Fade in
      content.classList.remove("fade-out");
      content.classList.add("fade-in");
      setTimeout(() => content.classList.remove("fade-in"), 300);
    }, 250);
  }

  function updateStatus(payload) {
    const badge = document.getElementById("status-badge");
    badge.textContent = payload.message || payload.state;
    badge.className = payload.state === "monitoring" ? "monitoring"
                    : payload.state === "error"      ? "error"
                    : "";
  }

  function showError(payload) {
    console.error("[error]", payload.message);
    updateStatus({ state: "error", message: `Error: ${payload.message}` });
  }

  // ── Mood gauge (SVG arc) ────────────────────────────────────────────────

  function updateGauge(score) {
    // Arc path: semicircle from 180° to 0°, total length ~251.2px
    const ARC_LENGTH = 251.2;
    const offset = ARC_LENGTH - (score / 100) * ARC_LENGTH;
    const arc = document.getElementById("gauge-arc");
    arc.setAttribute("stroke-dashoffset", offset.toFixed(1));
    arc.setAttribute("stroke", scoreToColor(score));
  }

  function scoreToColor(score) {
    // 0=red, 50=yellow, 100=green
    if (score < 50) {
      const r = 244, g = Math.round(67 + (171 - 67) * (score / 50)), b = 54;
      return `rgb(${r},${g},${b})`;
    } else {
      const r = Math.round(255 - (255 - 0) * ((score - 50) / 50));
      const g = Math.round(171 + (200 - 171) * ((score - 50) / 50));
      const b = Math.round(0 + (83 - 0) * ((score - 50) / 50));
      return `rgb(${r},${g},${b})`;
    }
  }

  // ── Utility ────────────────────────────────────────────────────────────────

  function esc(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Auto-connect on page load (for reconnects after server restart)
  connect();
</script>
</body>
</html>
